name: Update public typhoon snapshot

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-public-typhoon-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Fetch current NMC snapshot
        run: node scripts/update-typhoon-snapshot.mjs
      - name: Validate snapshot JSON
        run: node -e "const fs=require('node:fs'); const value=JSON.parse(fs.readFileSync('public/data/nmc-latest.json','utf8')); if(typeof value.active!=='boolean'||typeof value.signature!=='string') process.exit(1)"
      - name: Commit changed observation
        run: |
          if git diff --quiet -- public/data/nmc-latest.json; then
            echo "No new NMC observation"
            exit 0
          fi
          git config user.name "stormeye-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/nmc-latest.json
          git commit -m "data: refresh NMC typhoon snapshot [skip ci]"
          git push
